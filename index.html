<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amore App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #fff5f7 40%, #ffeef2 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }

        .logo-container {
            width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(255, 150, 170, 0.2);
            animation: bounce-slow 3s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .logo-container img { width: 75px; height: 75px; }

        /* Updated Logo styling */
        .brand-logo-main {
            width: 200px; /* Logo ki width adjust karein */
            height: auto;
            animation: fadeIn 1.2s ease-out;
        }

        .tagline { 
            color: #ffadb8; font-size: 13px; margin-top: 15px; 
            letter-spacing: 3px; text-transform: uppercase;
        }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div id="splash-screen">
        <div class="logo-container">
            <img src="/assets/amore_iconV01.svg" alt="App Icon">
        </div>
        
        <!-- Yahan main logo SVG set kar diya hai -->
        <img src="/assets/amore_logo.svg" alt="Amore" class="brand-logo-main">
        
        <p class="tagline">For Your Little One :)</p>
    </div>

    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-screen");
                splash.classList.add("hidden");
                
                setTimeout(() => {
                    if (localStorage.getItem('onboardingComplete') === 'true') {
                        window.location.href = "dashboard.html";
                    } else {
                        window.location.href = "onboarding/lang.html";
                    }
                }, 500);
            }, 3000);
        });
    </script>
</body>
</html>
