<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amore App</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        <link rel="stylesheet" href="style.css">
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Poppins', sans-serif; }

        /* प्रोफेशनल स्प्लैश स्क्रीन */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(160deg, #fff5f7 0%, #ffdee9 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }

        /* Figma जैसा लोगो कंटेनर */
        .logo-container {
            width: 140px; height: 140px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px); /* Glassmorphism */
            border-radius: 30px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
            margin-bottom: 25px;
            animation: bounce-slow 3s infinite ease-in-out;
        }

        .logo-container img { width: 90px; height: 90px; }

        .brand-name {
            font-family: 'Dancing Script', cursive;
            font-size: 52px; color: #ff4d8d;
            margin: 0; text-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .tagline { color: #ff85a2; font-size: 14px; margin-top: 10px; letter-spacing: 1px; }

        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <!-- यहाँ आप अपनी इमेज (जैसे watermarked_img_9006008991286514776.png) का लिंक डालें -->
            <img src="/assets/amore_iconV01.svg" alt="Baby Logo">
        </div>
        <h1 class="brand-name">Amore</h1>
        <p class="tagline">Welcome to your world</p>
    </div>

    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("splash-screen").classList.add("hidden");
            }, 3000);
        });
    </script>
    
    <script>
    window.addEventListener("load", () => {
        setTimeout(() => {
            // Check karein kya user ne pehle onboarding puri ki hai?
            if (localStorage.getItem('onboardingComplete') === 'true') {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "onboarding.html";
            }
        }, 3000); // 3 seconds ka wait
    });
</script>

<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">


</body>
</html>
