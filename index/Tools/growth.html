<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Tracker | Amore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <style>
        .input-neumorphic {
            background: #FDFBF7;
            border: none;
            box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
        }
    </style>
</head>
<body class="bg-[#FFF0F0] p-6 min-h-screen">

    <div class="max-w-md mx-auto">
        <a href="../dashboard.html" class="text-gray-500 font-bold mb-6 block">← Back</a>

        <div class="bg-white p-8 rounded-[40px] shadow-[10px_10px_30px_#d1d9e6,-10px_-10px_30px_#ffffff]">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Growth Tracker 📈</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Weight (kg)</label>
                    <input type="number" id="weight" placeholder="0.0" class="w-full p-4 rounded-2xl input-neumorphic focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">Height (cm)</label>
                    <input type="number" id="height" placeholder="0" class="w-full p-4 rounded-2xl input-neumorphic focus:outline-none">
                </div>

                <button onclick="saveGrowth()" class="w-full bg-[#FF7676] text-white font-bold py-4 rounded-2xl shadow-lg mt-4 active:scale-95 transition">
                    Save Record
                </button>
            </div>

            <!-- Result Display -->
            <div id="result" class="mt-8 p-4 bg-green-50 rounded-2xl hidden text-center text-green-700 font-bold">
                Record Saved Successfully! ✅
            </div>
        </div>
    </div>

    <script>
        function saveGrowth() {
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;

            if(weight && height) {
                // Yahan aap data store kar sakte hain (LocalStorage)
                localStorage.setItem('babyWeight', weight);
                localStorage.setItem('babyHeight', height);
                
                // Success message
                document.getElementById('result').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('result').classList.add('hidden');
                }, 3000);
            } else {
                alert("Please enter both values!");
            }
        }
    </script>
</body>
</html>
