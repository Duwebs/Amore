<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy Journey Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .lavender-header { background: #E9E1FF; }
        .selected-date { background-color: #FACC15 !important; color: white !important; border-radius: 50% !important; }
    </style>
</head>
<body class="bg-white">

    <div class="lavender-header pt-12 pb-16 px-6 relative shrink-0">
        <h1 class="text-3xl font-bold text-[#4A4A4A]">The start date of your last period?</h1>
        <p class="text-[#7C6A98] mt-2 text-sm font-medium">This date helps us decipher your ovulation date</p>
        
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-[0]">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="h-16 w-full">
                <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" fill="#FFFFFF"></path>
            </svg>
        </div>
    </div>

    <div class="flex-grow overflow-y-auto px-6 pt-8">
        <div class="flex justify-between items-center mb-6">
            <button onclick="changeMonth(-1)" class="text-2xl text-gray-400">‹</button>
            <div id="monthYear" class="font-bold text-lg text-gray-700">July 2026</div>
            <button onclick="changeMonth(1)" class="text-2xl text-gray-400">›</button>
        </div>
        
        <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-4">
            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        
        <div id="calendar" class="grid grid-cols-7 gap-y-4 text-center text-sm font-semibold text-gray-700"></div>
    </div>

    <div class="p-6 shrink-0 bg-white">
        <p onclick="window.location.href='menstrual-Setup.html'" class="text-center text-[#FF4D6D] font-bold mb-6 cursor-pointer flex items-center justify-center">
            I don't know <span class="ml-1">❯</span>
        </p>
        <button id="contBtn" disabled onclick="handleContinue()" class="w-full bg-gray-300 text-white py-4 rounded-xl font-bold">
            CONTINUE
        </button>
    </div>

    <script>
        let currentView = new Date();
        let isDateSelected = false; 

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            document.getElementById('monthYear').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            const firstDayIndex = new Date(currentView.getFullYear(), currentView.getMonth(), 1).getDay();
            for(let j=0; j<firstDayIndex; j++) calendar.innerHTML += `<div></div>`;

            const daysInMonth = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                let dayEl = document.createElement('div');
                dayEl.innerText = i;
                dayEl.className = "p-2 cursor-pointer rounded-full hover:bg-yellow-100";
                dayEl.onclick = () => {
                    document.querySelectorAll('.selected-date').forEach(el => el.classList.remove('selected-date'));
                    dayEl.classList.add('selected-date');
                    
                    isDateSelected = true; 
                    const btn = document.getElementById('contBtn');
                    btn.disabled = false;
                    btn.style.backgroundColor = "#FF4D6D";
                };
                calendar.appendChild(dayEl);
            }
        }

        function handleContinue() {
            if (isDateSelected) {
                window.location.href = 'pwa.html'; // Date select ki hai
            } else {
                window.location.href = 'menstrual-Setup.html'; // Nahi ki hai
            }
        }

        function changeMonth(offset) { 
            currentView.setMonth(currentView.getMonth() + offset); 
            renderCalendar(); 
        }
        
        renderCalendar();
    </script>
</body>
</html>
