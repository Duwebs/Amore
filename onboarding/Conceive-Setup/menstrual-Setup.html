<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menstrual Cycle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #FAFAFA; }
        .lavender-header { background: #E9E1FF; }
        .btn-hover:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="lavender-header pt-12 pb-20 px-6 relative shrink-0 rounded-b-[3rem]">
        <h1 class="text-3xl font-bold text-[#4A4A4A] leading-tight">Average length of menstrual cycle?</h1>
        <p class="text-[#7C6A98] mt-2 text-sm font-medium">This helps us to predict your fertile days</p>
        
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-[0]">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="h-16 w-full">
                <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" fill="#FAFAFA"></path>
            </svg>
        </div>
    </div>

    <!-- Counter Section -->
    <div class="flex-grow flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-purple-50 flex items-center gap-8">
            <button onclick="updateCycle(-1)" class="btn-hover w-16 h-16 rounded-full bg-gray-100 text-gray-400 text-3xl font-bold hover:bg-purple-100 hover:text-purple-600 transition">-</button>
            
            <div class="text-center w-28">
                <div id="cycleValue" class="text-7xl font-bold text-[#4A4A4A]">28</div>
                <p class="text-gray-400 font-medium uppercase tracking-widest text-xs">Days</p>
            </div>

            <button onclick="updateCycle(1)" class="btn-hover w-16 h-16 rounded-full bg-[#FF4D6D] text-white text-3xl font-bold shadow-lg shadow-pink-200 transition">+</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="p-6 shrink-0">
        <p onclick="window.location.href='period-Setup.html'" class="text-center text-[#7C6A98] font-semibold mb-6 cursor-pointer hover:text-[#FF4D6D] transition">
            I don't know ❯
        </p>
        <button onclick="window.location.href='pwa.html'" class="w-full bg-[#FF4D6D] text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-pink-100 hover:bg-[#e64662] transition-all">
            SAVE & CONTINUE
        </button>
    </div>

    <script>
        let cycle = 28;
        function updateCycle(change) {
            // Cycle 21 se 45 days ke beech hoti hai
            if (cycle + change >= 21 && cycle + change <= 45) {
                cycle += change;
                const el = document.getElementById('cycleValue');
                el.innerText = cycle;
                // Animation effect
                el.style.transform = 'scale(1.1)';
                setTimeout(() => el.style.transform = 'scale(1)', 100);
            }
        }
    </script>
</body>
</html>
