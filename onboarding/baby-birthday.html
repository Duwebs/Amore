<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Birthday</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; background-color: #FFFFFF; }
        
        .header-anim { animation: slideDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }

        .pink-header { background: #FFF5F7; }
        .selected-date { background-color: #FACC15 !important; color: white !important; border-radius: 50% !important; }
        .disabled-date { color: #D1D5DB !important; cursor: not-allowed; }
        
        /* Arrow hide karne ke liye */
        .hidden-arrow { visibility: hidden; }
    </style>
</head>
<body>

    <div class="header-anim pink-header pt-12 pb-16 px-6 relative shrink-0">
        <h1 class="text-3xl font-bold text-[#4A4A4A]">Your baby came in the world on?</h1>
        <p class="text-[#7C6A98] mt-2 text-sm font-medium">This helps us to provide you accurate information.</p>
        
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-[0]">
            <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="h-16 w-full">
                <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" fill="#FFFFFF"></path>
            </svg>
        </div>
    </div>

    <div class="flex-grow overflow-y-auto px-6 pt-8">
        <div class="flex justify-between items-center mb-6">
            <!-- Left arrow (past) -->
            <button onclick="changeMonth(-1)" class="text-2xl text-gray-400">‹</button>
            <div id="monthYear" class="font-bold text-lg text-gray-700">July 2026</div>
            <!-- Right arrow (future) - hidden logic -->
            <button id="nextBtn" onclick="changeMonth(1)" class="text-2xl text-gray-400">›</button>
        </div>
        
        <div class="grid grid-cols-7 text-center text-xs font-bold text-gray-400 mb-4">
            <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        
        <div id="calendar" class="grid grid-cols-7 gap-y-4 text-center text-sm font-semibold text-gray-700"></div>
    </div>

    <div class="p-6 shrink-0">
        <button id="contBtn" disabled onclick="window.location.href='pwa.html'" class="w-full bg-[#B0B0B0] text-white py-4 rounded-xl font-bold text-lg transition-all">CONTINUE</button>
    </div>

    <script>
        let currentView = new Date();
        const today = new Date();

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            document.getElementById('monthYear').innerText = currentView.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            // Right arrow (future) hide/show logic
            const nextBtn = document.getElementById('nextBtn');
            if (currentView.getMonth() === today.getMonth() && currentView.getFullYear() === today.getFullYear()) {
                nextBtn.classList.add('hidden-arrow');
            } else {
                nextBtn.classList.remove('hidden-arrow');
            }
            
            const firstDayIndex = new Date(currentView.getFullYear(), currentView.getMonth(), 1).getDay();
            for(let j=0; j<firstDayIndex; j++) calendar.innerHTML += `<div></div>`;

            const daysInMonth = new Date(currentView.getFullYear(), currentView.getMonth() + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                let dayEl = document.createElement('div');
                dayEl.innerText = i;
                dayEl.className = "p-2 cursor-pointer";
                
                let checkDate = new Date(currentView.getFullYear(), currentView.getMonth(), i);
                
                if (checkDate > today) {
                    dayEl.classList.add('disabled-date');
                } else {
                    dayEl.onclick = function() {
                        document.querySelectorAll('.selected-date').forEach(el => el.classList.remove('selected-date'));
                        this.classList.add('selected-date');
                        const btn = document.getElementById('contBtn');
                        btn.disabled = false;
                        btn.style.backgroundColor = "#FF4D6D";
                    };
                }
                calendar.appendChild(dayEl);
            }
        }

        function changeMonth(offset) {
            currentView.setMonth(currentView.getMonth() + offset);
            renderCalendar();
        }

        renderCalendar();
    </script>
</body>
</html>
