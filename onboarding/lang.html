<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        /* Body se height aur overflow hata diya taaki wo content ke sath scroll ho sake */
        body { font-family: 'Outfit', sans-serif; background-color: #FFFFFF; min-height: 100vh; }
        
        .lang-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; overflow: hidden; }
        .selected { border: 4px solid #FF4D6D !important; transform: scale(0.95); }
        .check-icon { display: none; }
        .selected .check-icon { display: flex; }
        
        .slide-out { animation: slideLeft 0.5s forwards; }
        @keyframes slideLeft { to { transform: translateX(-150%); opacity: 0; } }
        .header-out { animation: fadeOut 0.4s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="header" class="relative bg-[#FFFDF5] pt-8 pb-14 px-6 shadow-sm">
        <h1 class="text-3xl font-extrabold text-[#4A4A4A] leading-tight">Choose your <br>language</h1>
        <p class="text-[#8E8E8E] mt-3">This helps us to provide content in your preferred language</p>
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden">
            <svg viewBox="0 0 500 50" preserveAspectRatio="none" class="h-10 w-full"><path d="M0,0 C150,50 350,50 500,0 L500,50 L0,50 Z" fill="#FFFFFF"></path></svg>
        </div>
    </div>

    <div id="grid" class="grid grid-cols-2 gap-4 p-5">
        <div onclick="select(this)" class="lang-card bg-[#FFB7B7] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">English</h2>
            <p class="text-white/80 text-sm font-medium">English</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="/assets/langeng.svg" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
        <div onclick="select(this)" class="lang-card bg-[#C7B7FF] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">हिन्दी</h2>
            <p class="text-white/80 text-sm font-medium">Hindi</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="https://cdn-icons-png.flaticon.com/128/2920/2920336.png" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
        <div onclick="select(this)" class="lang-card bg-[#FFD1A9] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">বাংলা</h2>
            <p class="text-white/80 text-sm font-medium">Bangla</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="https://cdn-icons-png.flaticon.com/128/2920/2920336.png" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
        <div onclick="select(this)" class="lang-card bg-[#98E4D5] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">తెలుగు</h2>
            <p class="text-white/80 text-sm font-medium">Telugu</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="https://cdn-icons-png.flaticon.com/128/2920/2920336.png" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
        <div onclick="select(this)" class="lang-card bg-[#A3C1FF] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">தமிழ்</h2>
            <p class="text-white/80 text-sm font-medium">Tamil</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="https://cdn-icons-png.flaticon.com/128/2920/2920336.png" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
        <div onclick="select(this)" class="lang-card bg-[#FFE8A3] p-4 rounded-3xl flex flex-col justify-center shadow-lg h-32">
            <h2 class="font-bold text-white text-lg">ಕನ್ನಡ</h2>
            <p class="text-white/80 text-sm font-medium">Kannada</p>
            <div class="check-icon absolute top-3 right-3 bg-white rounded-full p-1"><svg class="w-4 h-4 text-[#FF4D6D]" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></div>
            <img src="/assets/langkan.svg" class="absolute -right-2 -bottom-2 w-16 opacity-60 pointer-events-none">
        </div>
    </div>

    <div class="p-5">
        <button id="contBtn" disabled onclick="goNext()" class="w-full bg-gray-300 text-white py-4 rounded-2xl font-bold text-lg transition-all shadow-md">CONTINUE</button>
    </div>

    <script>
        function select(el) {
            document.querySelectorAll('.lang-card').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            const btn = document.getElementById('contBtn');
            btn.disabled = false;
            btn.style.backgroundColor = "#FF4D6D";
        }
        function goNext() {
            document.getElementById('header').classList.add('header-out');
            document.querySelectorAll('.lang-card').forEach((card, index) => {
                setTimeout(() => { card.classList.add('slide-out'); }, index * 80);
            });
        }
    </script>
</body>
</html>
