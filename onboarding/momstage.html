<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mom Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #FFFFFF; height: 100vh; overflow: hidden; }
        .header-anim { opacity: 0; animation: slideDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in-right { opacity: 0; animation: slideInRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        .stage-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; border: 2px solid transparent; position: relative; }
        .illustration { width: 60px; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .selected-stage { border-color: #FF4D6D !important; transform: scale(1.02); }
        .selected-stage .illustration { transform: translateY(-30px) scale(1.1); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)); }
    </style>
</head>
<body class="flex flex-col h-full">

    <div class="header-anim bg-[#FFF5F7] pt-8 pb-12 px-6 relative shrink-0">
        <h1 class="text-2xl font-extrabold text-[#4A4A4A] leading-tight">What life stage are you currently at?</h1>
        <p class="text-[#8E8E8E] mt-2 text-sm">This helps us to provide relevant experience.</p>
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-[0]">
            <svg viewBox="0 0 500 50" preserveAspectRatio="none" class="h-8 w-full"><path d="M0,0 C150,50 350,50 500,0 L500,50 L0,50 Z" fill="#FFFFFF"></path></svg>
        </div>
    </div>

    <div class="px-6 flex flex-col justify-center flex-grow space-y-4">
        <div onclick="selectStage(this, 'pregnant')" class="stage-card bg-[#DCFCE7] slide-in-right" style="animation-delay: 0.2s;">
            <span class="font-bold text-lg text-gray-700">Pregnant</span>
            <img src="https://cdn-icons-png.flaticon.com/128/3067/3067277.png" class="illustration">
        </div>
        <div onclick="selectStage(this, 'mother')" class="stage-card bg-[#FEF3C7] slide-in-right" style="animation-delay: 0.35s;">
            <span class="font-bold text-lg text-gray-700">Mother</span>
            <img src="https://cdn-icons-png.flaticon.com/128/3067/3067272.png" class="illustration">
        </div>
        <div onclick="selectStage(this, 'trying')" class="stage-card bg-[#EDE9FE] slide-in-right" style="animation-delay: 0.5s;">
            <span class="font-bold text-lg text-gray-700">Trying to conceive</span>
            <img src="https://cdn-icons-png.flaticon.com/128/3067/3067269.png" class="illustration">
        </div>
    </div>

    <div class="p-6 shrink-0">
        <button id="contBtn" disabled onclick="saveAndNext()" class="w-full bg-gray-300 text-white py-4 rounded-xl font-bold text-lg active:scale-95 slide-in-right" style="animation-delay: 0.65s;">
            CONTINUE
        </button>
    </div>

    <script>
        let selectedStage = "";
        function selectStage(el, stage) {
            document.querySelectorAll('.stage-card').forEach(i => i.classList.remove('selected-stage'));
            el.classList.add('selected-stage');
            selectedStage = stage;
            localStorage.setItem('userStage', stage);
            const btn = document.getElementById('contBtn');
            btn.disabled = false; btn.style.backgroundColor = "#FF4D6D";
        }
        function saveAndNext() {
            if (selectedStage === 'trying') {
                window.location.href = "Conceive-Setup/Conceive-Setup.html";
            } else if (selectedStage === 'pregnant') {
                // Yahan tum pregnant-setup.html bana sakte ho
                window.location.href = "pregnancy-status.html"; 
            } else if (selectedStage === 'mother') {
                // Yahan tum mother-setup.html bana sakte ho
                window.location.href = "gender.html";
            }
        }
    </script>
</body>
</html>
