<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Role</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #FFFFFF; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header-anim { opacity: 0; animation: slideDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-anim { opacity: 0; animation: slideInRight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        
        .role-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; border-radius: 12px; height: 120px; 
            position: relative; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; 
            overflow: visible;
        }
        
        .wife-card { background-color: #FCE7F3; border: 2px solid #FBCFE8; }
        .husband-card { background-color: #DBEAFE; border: 2px solid #BFDBFE; }
        
        .selected-role { transform: scale(1.02); border-color: #FF4D6D !important; z-index: 10; }
        
        .illustration { 
            width: 80px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        
        .selected-role .illustration { 
            transform: translateY(-35px) scale(1.15); 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body>

    <div id="header" class="header-anim relative bg-[#FFF5F7] pt-8 pb-12 px-6 shrink-0">
        <h1 id="title" class="text-2xl font-extrabold text-[#4A4A4A] leading-tight"></h1>
        <p id="subtitle" class="text-[#8E8E8E] mt-2 text-sm"></p>
        <div class="absolute -bottom-1 left-0 w-full overflow-hidden leading-[0]">
            <svg viewBox="0 0 500 50" preserveAspectRatio="none" class="h-8 w-full"><path d="M0,0 C150,50 350,50 500,0 L500,50 L0,50 Z" fill="#FFFFFF"></path></svg>
        </div>
    </div>

    <!-- Cards container takes remaining space -->
    <div id="cards" class="px-6 flex flex-col justify-center flex-grow space-y-8">
        <div onclick="selectRole(this, 'wife')" class="card-anim role-card wife-card" style="animation-delay: 0.3s;">
            <span id="txt-wife" class="font-bold text-lg text-gray-700"></span>
            <img src="/assets/female.png" class="illustration">
        </div>
        
        <div onclick="selectRole(this, 'husband')" class="card-anim role-card husband-card" style="animation-delay: 0.45s;">
            <span id="txt-husband" class="font-bold text-lg text-gray-700"></span>
            <img src="/assets/male.png" class="illustration">
        </div>
    </div>

    <div class="p-6 shrink-0">
        <button id="contBtn" disabled onclick="saveAndNext()" class="w-full bg-gray-300 text-white py-4 rounded-xl font-bold text-lg active:scale-95 shadow-md">
            CONTINUE
        </button>
    </div>

    <script>
        // Language content
        const translations = {
            "English": { title: "What's your role in the family?", subtitle: "This helps us provide you with relevant content", wife: "Wife | Mother", husband: "Husband | Father", btn: "CONTINUE" },
            "हिन्दी": { title: "परिवार में आपकी भूमिका क्या है?", subtitle: "यह हमें आपकी भूमिका के अनुसार कंटेंट प्रदान करने में मदद करता है", wife: "पत्नी | माँ", husband: "पति | पिता", btn: "आगे बढ़ें" }
        };

        const userLang = localStorage.getItem('userLanguage') || "English";
        const langData = translations[userLang] || translations["English"];

        document.getElementById('title').innerText = langData.title;
        document.getElementById('subtitle').innerText = langData.subtitle;
        document.getElementById('txt-wife').innerText = langData.wife;
        document.getElementById('txt-husband').innerText = langData.husband;
        document.getElementById('contBtn').innerText = langData.btn;

        function selectRole(el, role) {
            document.querySelectorAll('.role-card').forEach(i => i.classList.remove('selected-role'));
            el.classList.add('selected-role');
            localStorage.setItem('userRole', role);
            const btn = document.getElementById('contBtn');
            btn.disabled = false;
            btn.style.backgroundColor = "#FF4D6D";
        }

        // Updated Navigation Logic
        function saveAndNext() {
            const role = localStorage.getItem('userRole');
            if (role === 'wife') {
                window.location.href = "momstage.html";
            } else if (role === 'husband') {
                window.location.href = "dadstage.html";
            }
        }
    </script>
</body>
</html>
